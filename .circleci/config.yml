version: 2.1

jobs:
  verify:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Test
          command: npm test

workflows:
  version: 2
  ci:
    jobs:
      - verify
