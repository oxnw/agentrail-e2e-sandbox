name: Scenario Contract

on:
  push:
    branches:
      - main
      - integration/live
      - scenario/**
      - scratch/**
  pull_request:
    branches:
      - main
      - integration/live

jobs:
  validate-scenarios:
    name: Scenario Contract / Validate Scenario Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run scenario:validate
      - run: npm run catalog:validate
