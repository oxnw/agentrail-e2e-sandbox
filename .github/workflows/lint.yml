name: Lint

on:
  push:
    branches:
      - main
      - integration/live
      - scenario/**
      - scratch/**
  pull_request:
    branches:
      - main
      - integration/live

jobs:
  repo-checks:
    name: Lint / Repo Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
